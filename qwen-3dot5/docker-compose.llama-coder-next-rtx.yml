# Qwen3-Coder-Next (80B total / 3B active MoE) via llama.cpp
#
# Coding-specialized MoE model with 262K context. Only 3B params
# are active per forward pass → very high throughput despite 80B total.
# Benchmarks: 70.6–71.3% on SWE-bench Verified (Feb 2026).
#
# The GGUF model is downloaded automatically on first start (~50 GB).
# Downloads are cached in the shared qwen35_huggingface_cache volume.
#
# Perf notes vs. a basic config:
#   -b 4096 -ub 2048     : default ubatch=512 massively underutilizes Blackwell;
#                          this is the single biggest PP throughput gain
#   GGML_CUDA_GRAPH_OPT=1: concurrent CUDA streams on top of graph capture
#   ipc: host            : full CUDA IPC + no /dev/shm size limit
#   --mlock              : pin weights in VRAM, eliminates cold-start page faults
#   --jinja              : correct thinking-mode (<think>) token handling
#
# Usage: docker compose -f docker-compose.llama-coder-next-rtx.yml up -d
# API endpoint: http://localhost:11438/v1

name: qwen3-coder-next

services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: qwen3-coder-next
    restart: unless-stopped
    ipc: host

    ulimits:
      memlock: -1
      stack: 67108864

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ports:
      - "11438:11438"

    volumes:
      - model_cache:/root/.cache/huggingface

    environment:
      - LLAMA_CACHE=/root/.cache/huggingface/llama.cpp
      - GGML_CUDA_GRAPH_OPT=1

    command:
      - --hf-repo
      - unsloth/Qwen3-Coder-Next-GGUF
      - --hf-file
      - Qwen3-Coder-Next-UD-Q4_K_XL.gguf
      - -ngl
      - "99"
      - -c
      - "262144"
      - -np
      - "1"
      - -fa
      - "on"
      - --cache-type-k
      - q8_0
      - --cache-type-v
      - q8_0
      - -b
      - "4096"
      - -ub
      - "2048"
      - -t
      - "8"
      - --threads-batch
      - "8"
      - --mlock
      - --jinja
      - --host
      - "0.0.0.0"
      - --port
      - "11438"
      - -a
      - qwen3-coder-next

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11438/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  model_cache:
    name: qwen35_huggingface_cache
    external: true
