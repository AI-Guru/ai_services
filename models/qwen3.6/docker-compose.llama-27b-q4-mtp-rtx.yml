# Qwen3.6-27B GGUF UD-Q4_K_XL + MTP via llama.cpp (custom MTP build)
#
# unsloth/Qwen3.6-27B-MTP-GGUF · Q4_K_XL Unsloth Dynamic GGUF (16.68 GB).
# Uses --spec-type mtp from the am17an mtp-clean branch (PR #22673,
# not yet in mainline llama.cpp). Image built locally as
# llama.cpp-mtp:latest from Dockerfile.llama-mtp.
#
# Per the model card and PR description, MTP gives ~1.5-2x faster
# generation by activating the model's built-in qwen3_next_mtp draft
# head. Compared to standard GGUF (no MTP):
#   - Standard Q4_K_M on Carnice-V2: 70.7 tok/s
#   - With MTP enabled: target ~100-130 tok/s
#
# Limitations of the MTP PR:
#   - -np 1 only (no parallel slots)
#   - --mmproj not supported with MTP (text-only is fine here)
#
# Usage: docker compose -f docker-compose.llama-27b-q4-mtp-rtx.yml up -d
# API endpoint: http://localhost:11436/v1
# Model name served as: qwen3.6-27b

services:
  qwen36-27b-q4-mtp:
    image: llama.cpp-mtp:latest
    container_name: qwen36-27b-q4-mtp
    restart: unless-stopped

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ulimits:
      memlock: -1
      stack: 67108864

    ports:
      - "11436:11436"

    volumes:
      - model_cache:/root/.cache/huggingface

    environment:
      - LLAMA_CACHE=/root/.cache/huggingface/llama.cpp

    command:
      - --hf-repo
      - unsloth/Qwen3.6-27B-MTP-GGUF
      - --hf-file
      - Qwen3.6-27B-UD-Q4_K_XL.gguf
      - -ngl
      - "99"
      - -c
      - "65536"
      - -np
      - "1"
      - -fa
      - "on"
      - --cache-type-k
      - q8_0
      - --cache-type-v
      - q8_0
      - --jinja
      - --spec-type
      - mtp
      - --spec-draft-n-max
      - "3"
      - --host
      - "0.0.0.0"
      - --port
      - "11436"
      - -a
      - qwen3.6-27b

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11436/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 900s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  model_cache:
    name: qwen36_llama_mtp_cache

networks:
  default:
    name: qwen36-network
