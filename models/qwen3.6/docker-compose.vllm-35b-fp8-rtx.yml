# Qwen3.6-35B-A3B-FP8 — official Qwen pre-quantized FP8 model
#
# Uses Qwen/Qwen3.6-35B-A3B-FP8: fine-grained block-wise FP8 (block=128),
# quantized by the Qwen team — including DeltaNet layers — so no runtime
# quantization surprises. vLLM reads the quant config from the model directly.
#
# Architecture: hybrid 30 Gated DeltaNet + 10 full-attention layers,
# 256 experts (8 routed + 1 shared active per token), 35B total / 3B active.
#
# RTX PRO 6000 Blackwell (96 GB, SM 120) runs block-wise FP8 as W8A8 natively.
# Weights: ~35 GB vs ~70 GB BF16 → ~61 GB free for KV cache at 0.90 util,
# roughly 3× more KV cache headroom for concurrency and longer contexts.
#
# Note: --kv-cache-dtype fp8_e4m3 is omitted — vLLM bug with DeltaNet layers
# (vllm-project/vllm#26646); re-enable once upstream fix lands.
#
# Usage: docker compose -f docker-compose.vllm-35b-fp8-rtx.yml up -d
# API endpoint: http://localhost:11435/v1
# Model name served as: qwen3.6-35b

services:
  qwen36-fp8:
    image: vllm/vllm-openai:v0.19.0-cu130
    container_name: qwen36-fp8
    restart: unless-stopped

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ipc: host
    dns:
      - 8.8.8.8
      - 8.8.4.4
    shm_size: 64gb

    ulimits:
      memlock: -1
      stack: 67108864

    ports:
      - "11435:11435"

    volumes:
      - huggingface_cache:/root/.cache/huggingface
      - ./qwen3.6_chat_template.jinja:/chat_template.jinja:ro

    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - VLLM_LOGGING_LEVEL=${VLLM_LOGGING_LEVEL:-INFO}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - VLLM_ATTENTION_BACKEND=FLASH_ATTN
      - VLLM_USE_FLASHINFER_SAMPLER=0

    command:
      - Qwen/Qwen3.6-35B-A3B-FP8
      - --served-model-name
      - qwen3.6-35b
      - --host
      - "0.0.0.0"
      - --port
      - "11435"
      - --max-model-len
      - "262144"
      - --gpu-memory-utilization
      - "0.90"
      - --reasoning-parser
      - qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --enable-prefix-caching
      - --max-num-batched-tokens
      - "16384"
      - --chat-template
      - /chat_template.jinja
      # NOTE: MTP speculative decoding tested 2026-04-23 and gave NO speedup
      # for 35B-A3B (201.7 vs 203.2 tok/s baseline). MoE decode is already
      # cheap (~3B active), so draft+verify overhead eats the speculative gain.
      # The dense 27B benefits (+41%) but the MoE 35B does not. Keeping MTP off.

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11435/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  huggingface_cache:
    name: qwen36_huggingface_cache

networks:
  default:
    name: qwen36-network
