# Qwen3.6-35B-A3B GGUF Q8_0 + MTP via llama.cpp (custom MTP build)
#
# unsloth/Qwen3.6-35B-A3B-MTP-GGUF · Q8_0 standard GGUF (35.21 GB).
# High-fidelity reference for the MoE; pairs with the Q4_K_XL+MTP
# variant on the same llama.cpp-mtp image.
#
# Note: the GGUF is 35 GB; with q8_0 KV cache at 64K context, memory
# budget on a 96 GB GPU is comfortable.
#
# Usage: docker compose -f docker-compose.llama-35b-q8-mtp-rtx.yml up -d
# API endpoint: http://localhost:11435/v1
# Model name served as: qwen3.6-35b

services:
  qwen36-35b-q8-mtp:
    image: llama.cpp-mtp:latest
    container_name: qwen36-35b-q8-mtp
    restart: unless-stopped

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ulimits:
      memlock: -1
      stack: 67108864

    ports:
      - "11435:11435"

    volumes:
      - model_cache:/root/.cache/huggingface

    environment:
      - LLAMA_CACHE=/root/.cache/huggingface/llama.cpp

    command:
      - --hf-repo
      - unsloth/Qwen3.6-35B-A3B-MTP-GGUF
      - --hf-file
      - Qwen3.6-35B-A3B-Q8_0.gguf
      - -ngl
      - "99"
      - -c
      - "65536"
      - -np
      - "1"
      - -fa
      - "on"
      - --cache-type-k
      - q8_0
      - --cache-type-v
      - q8_0
      - --jinja
      - --spec-type
      - mtp
      - --spec-draft-n-max
      - "3"
      - --host
      - "0.0.0.0"
      - --port
      - "11435"
      - -a
      - qwen3.6-35b

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11435/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 1200s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  model_cache:
    name: qwen36_llama_mtp_cache

networks:
  default:
    name: qwen36-network
