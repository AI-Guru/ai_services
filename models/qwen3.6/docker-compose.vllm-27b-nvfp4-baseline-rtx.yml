# Qwen3.6-27B NVFP4 (modelopt) — baseline, NO speculative decoding
#
# Companion to docker-compose.vllm-27b-nvfp4-mtp-rtx.yml. Uses the same
# MTP-aware checkpoint sakamakismile/Qwen3.6-27B-Text-NVFP4-MTP, but
# disables --speculative-config so the MTP head is dormant. This lets us
# isolate the NVFP4 quantisation gain from the MTP gain on top.
#
# Note: even with the MTP head present in the weights, NOT passing
# --speculative-config means vLLM ignores it. The MTP layer parameters
# still consume a small amount of memory (~0.4 GiB) but they're not on
# the forward path.
#
# Measured (test_chat.py, --no-think, 3 runs, RTX PRO 6000):
#   - Decode: 57.4 tok/s avg / 57.35 steady-state — only 1.22x FP8 baseline
#     from quantisation alone. INT4 baseline is 80.7 tok/s; the gap (+41%)
#     reflects NVFP4 group_size=16 dequant overhead on this hybrid 27B
#     dominating Blackwell's INT4/FP4 tensor-core arithmetic advantage at
#     decode time. Adding MTP brings it to 83.5 (+45%).
#
# Usage: docker compose --env-file ../../.env -f docker-compose.vllm-27b-nvfp4-baseline-rtx.yml up -d
# API endpoint: http://localhost:11436/v1
# Model name served as: qwen3.6-27b

services:
  qwen36-27b-nvfp4-baseline:
    image: vllm/vllm-openai:cu130-nightly
    container_name: qwen36-27b-nvfp4-baseline
    restart: unless-stopped

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ipc: host
    dns: ["8.8.8.8", "8.8.4.4"]
    shm_size: 64gb

    ulimits:
      memlock: -1
      stack: 67108864

    ports:
      - "11436:11436"

    volumes:
      - huggingface_cache:/root/.cache/huggingface
      - ./qwen3.6_unsloth_chat_template.jinja:/chat_template.jinja:ro

    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - VLLM_LOGGING_LEVEL=${VLLM_LOGGING_LEVEL:-INFO}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - VLLM_ATTENTION_BACKEND=FLASH_ATTN
      - VLLM_USE_FLASHINFER_SAMPLER=0

    command:
      - sakamakismile/Qwen3.6-27B-Text-NVFP4-MTP
      - --served-model-name
      - qwen3.6-27b
      - --host
      - "0.0.0.0"
      - --port
      - "11436"
      - --max-model-len
      - "262144"
      - --gpu-memory-utilization
      - "0.90"
      - --reasoning-parser
      - qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --enable-prefix-caching
      - --language-model-only
      - --max-num-batched-tokens
      - "16384"
      - --chat-template
      - /chat_template.jinja

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11436/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  huggingface_cache:
    name: qwen36_huggingface_cache

networks:
  default:
    name: qwen36-network
