# Qwen3.6-27B INT4 (AutoRound, W4A16) — baseline, NO speculative decoding
#
# Companion to docker-compose.vllm-27b-int4-rtx.yml (INT4 + MTP) and
# docker-compose.vllm-27b-int4-dflash-rtx.yml (INT4 + DFlash).
#
# Purpose: isolate the contribution of speculative decoding from the
# contribution of 4-bit weights. Comparison anchor for:
#   INT4 alone → INT4 + MTP → INT4 + DFlash
#
# Same model, same flags, just no --speculative-config.
#
# Measured (test_chat.py, --no-think, 3 runs, RTX PRO 6000):
#   - Decode: 80.7 tok/s avg / 80.85 steady-state — 1.72x FP8 baseline (47.0)
#     from quantisation alone. Adding MTP brings it to 102.8 (+27%); adding
#     DFlash N=8 brings it to 140.2 / 146 steady (+81% over INT4 alone).
#
# Usage: docker compose --env-file ../../.env -f docker-compose.vllm-27b-int4-baseline-rtx.yml up -d
# API endpoint: http://localhost:11436/v1
# Model name served as: qwen3.6-27b

services:
  qwen36-27b-int4-baseline:
    image: vllm/vllm-openai:cu130-nightly
    container_name: qwen36-27b-int4-baseline
    restart: unless-stopped

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ipc: host
    dns: ["8.8.8.8", "8.8.4.4"]
    shm_size: 64gb

    ulimits:
      memlock: -1
      stack: 67108864

    ports:
      - "11436:11436"

    volumes:
      - huggingface_cache:/root/.cache/huggingface
      - ./qwen3.6_unsloth_chat_template.jinja:/chat_template.jinja:ro

    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - VLLM_LOGGING_LEVEL=${VLLM_LOGGING_LEVEL:-INFO}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - VLLM_ATTENTION_BACKEND=FLASH_ATTN
      - VLLM_USE_FLASHINFER_SAMPLER=0

    command:
      - Lorbus/Qwen3.6-27B-int4-AutoRound
      - --served-model-name
      - qwen3.6-27b
      - --host
      - "0.0.0.0"
      - --port
      - "11436"
      - --max-model-len
      - "262144"
      - --gpu-memory-utilization
      - "0.90"
      - --reasoning-parser
      - qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --enable-prefix-caching
      - --language-model-only
      - --max-num-batched-tokens
      - "16384"
      - --chat-template
      - /chat_template.jinja

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11436/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  huggingface_cache:
    name: qwen36_huggingface_cache

networks:
  default:
    name: qwen36-network
