# Qwen3.6-35B-A3B (MoE) GGUF UD-Q4_K_XL via llama.cpp Vulkan — AMD R9700 (gfx1201, 32 GB)
#
# unsloth/Qwen3.6-35B-A3B-GGUF · UD-Q4_K_XL Unsloth Dynamic GGUF (~22.9 GB).
# MoE with 3B active params per token — bandwidth/compute-light, fast decode.
#
# Context: full native 262 144 (the model's max without YaRN). DeltaNet's
# small KV layers mean a 256K KV cache is only ~2.7 GB at q8_0, so we
# fit weights (~21 GB) + KV (~2.7 GB) inside 32 GB VRAM with headroom.
# Measured 109 tok/s decode at 262K ctx — same as 32K, no degradation.
#
# Usage: docker compose -f docker-compose.llama-35b-q4-vulkan.yml up -d
# API endpoint: http://localhost:11447/v1
# Model name served as: qwen3.6-35b

services:
  qwen36-35b-q4-vulkan:
    image: ghcr.io/ggml-org/llama.cpp:server-vulkan
    container_name: qwen36-35b-q4-vulkan
    restart: unless-stopped

    devices:
      - /dev/kfd
      - /dev/dri

    group_add:
      - "44"
      - "992"

    ports:
      - "11447:11447"

    volumes:
      - model_cache:/root/.cache/huggingface

    # Speed-tuned env (measured 2026-05-13 on R9700):
    #   - GGML_VK_ALLOW_GRAPHICS_QUEUE=1 routes Vulkan submissions through the
    #     graphics queue. On RDNA 4 MoE decode this gives +18 % over the compute
    #     queue path (109.7 vs 92.5 tok/s). No effect on dense models.
    #   - Requires llama.cpp:server-vulkan from 2026-05+ (build b9128 or later).
    environment:
      - LLAMA_CACHE=/root/.cache/huggingface/llama.cpp
      - GGML_VK_ALLOW_GRAPHICS_QUEUE=1

    command:
      - --hf-repo
      - unsloth/Qwen3.6-35B-A3B-GGUF
      - --hf-file
      - Qwen3.6-35B-A3B-UD-Q4_K_XL.gguf
      - -ngl
      - "99"
      - -c
      - "262144"
      - -np
      - "1"
      - -fa
      - "on"
      - --cache-type-k
      - q8_0
      - --cache-type-v
      - q8_0
      - --jinja
      - --host
      - "0.0.0.0"
      - --port
      - "11447"
      - -a
      - qwen3.6-35b

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11447/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  model_cache:
    name: qwen36_huggingface_cache

networks:
  default:
    name: qwen36-network
