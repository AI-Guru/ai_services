# Qwen3.6-27B GGUF UD-Q4_K_XL via llama.cpp Vulkan — AMD R9700 (gfx1201, 32 GB)
#
# unsloth/Qwen3.6-27B-GGUF · UD-Q4_K_XL Unsloth Dynamic GGUF (~17.6 GB).
# Uses the stock ggml-org server-vulkan image — no custom build, no MTP.
#
# Usage: docker compose -f docker-compose.llama-27b-q4-vulkan.yml up -d
# API endpoint: http://localhost:11448/v1
# Model name served as: qwen3.6-27b

services:
  qwen36-27b-q4-vulkan:
    image: ghcr.io/ggml-org/llama.cpp:server-vulkan
    container_name: qwen36-27b-q4-vulkan
    restart: unless-stopped

    devices:
      - /dev/kfd
      - /dev/dri

    group_add:
      - "44"
      - "992"

    ports:
      - "11448:11448"

    volumes:
      - model_cache:/root/.cache/huggingface

    environment:
      - LLAMA_CACHE=/root/.cache/huggingface/llama.cpp

    command:
      - --hf-repo
      - unsloth/Qwen3.6-27B-GGUF
      - --hf-file
      - Qwen3.6-27B-UD-Q4_K_XL.gguf
      - -ngl
      - "99"
      - -c
      - "65536"
      - -np
      - "1"
      - -fa
      - "on"
      - --cache-type-k
      - q8_0
      - --cache-type-v
      - q8_0
      - --jinja
      - --host
      - "0.0.0.0"
      - --port
      - "11448"
      - -a
      - qwen3.6-27b

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11448/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  model_cache:
    name: qwen36_huggingface_cache

networks:
  default:
    name: qwen36-network
