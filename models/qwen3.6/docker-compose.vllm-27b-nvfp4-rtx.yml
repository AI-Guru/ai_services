# Qwen3.6-27B-NVFP4 — community NVFP4 quantization (NVIDIA ModelOpt)
#
# Uses mmangkad/Qwen3.6-27B-NVFP4: NVFP4 mixed-precision (only linear ops in
# transformer blocks quantized to FP4; embeddings, vision encoder, LM head,
# and norms stay BF16/FP8). On-disk ~31 GB, effective active weights ~14-18 GB.
#
# Architecture: dense 27B, 64 hybrid layers (48 DeltaNet + 16 full attention).
#
# Requires Blackwell GPUs (SM_120) for hardware-accelerated NVFP4 tensor cores.
# RTX PRO 6000 Blackwell: ~14-18 GB effective weights at 1.6 TB/s memory bandwidth
# → theoretical peak ~90-100 tok/s, ~1.5-2× faster than FP8 (47 tok/s measured).
#
# Sampling and concurrency tuned per upstream community recipe:
# https://huggingface.co/mmangkad/Qwen3.6-27B-NVFP4
#
# Usage: docker compose -f docker-compose.vllm-27b-nvfp4-rtx.yml up -d
# API endpoint: http://localhost:11436/v1
# Model name served as: qwen3.6-27b

services:
  qwen36-27b-nvfp4:
    image: vllm/vllm-openai:v0.19.0-cu130
    container_name: qwen36-27b-nvfp4
    restart: unless-stopped

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ipc: host
    dns:
      - 8.8.8.8
      - 8.8.4.4
    shm_size: 64gb

    ulimits:
      memlock: -1
      stack: 67108864

    ports:
      - "11436:11436"

    volumes:
      - huggingface_cache:/root/.cache/huggingface
      - ./qwen3.6_unsloth_chat_template.jinja:/chat_template.jinja:ro

    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - VLLM_LOGGING_LEVEL=${VLLM_LOGGING_LEVEL:-INFO}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - VLLM_ATTENTION_BACKEND=FLASH_ATTN
      - VLLM_USE_FLASHINFER_SAMPLER=0

    command:
      - mmangkad/Qwen3.6-27B-NVFP4
      - --served-model-name
      - qwen3.6-27b
      - --host
      - "0.0.0.0"
      - --port
      - "11436"
      - --max-model-len
      - "262144"
      - --gpu-memory-utilization
      - "0.85"
      - --reasoning-parser
      - qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --enable-prefix-caching
      - --language-model-only
      - --block-size
      - "32"
      - --max-num-batched-tokens
      - "4096"
      - --max-num-seqs
      - "4"
      - --chat-template
      - /chat_template.jinja
      - --default-chat-template-kwargs
      - '{"preserve_thinking": true}'
      - --override-generation-config
      - '{"temperature": 0.6, "top_p": 0.95, "top_k": 20, "min_p": 0.0, "presence_penalty": 0.0, "repetition_penalty": 1.0}'

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11436/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 240s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  huggingface_cache:
    name: qwen36_huggingface_cache

networks:
  default:
    name: qwen36-network
