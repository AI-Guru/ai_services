# Qwen3.6-35B-A3B-FP8 + DFlash speculative decoding (experimental)
#
# Uses Qwen/Qwen3.6-35B-A3B-FP8 as target and z-lab/Qwen3.6-35B-A3B-DFlash
# as the speculative drafter. DFlash uses block-diffusion drafting, proposing
# 15 tokens per drafter forward pass; the target validates them in one batched
# forward pass.
#
# Why DFlash may help here when MTP didn't:
# - The 35B-A3B's MoE forward pass is already cheap (~5 ms on 3B active),
#   so MTP's draft head (which shares the MoE forward path) added overhead
#   roughly equal to its gain → net 0% in earlier testing.
# - DFlash uses an EXTERNAL 0.5B dense drafter (~1 ms forward), much cheaper
#   than spawning the MoE expert routing per draft token, AND drafts in
#   parallel blocks rather than autoregressively.
#
# Reported speedups (z-lab on B200): 1.4-2.9x at concurrency=1.
# Drafter status: finalized (unlike the 27B variant which is still training).
#
# Differs from docker-compose.vllm-35b-fp8-textonly-rtx.yml only by:
#   - vllm/vllm-openai:cu130-nightly (DFlash method not in v0.19.0)
#   - container name and --speculative-config flag
#   - longer healthcheck start_period (drafter download + dual compile)
#
# Note: DFlash drafter targets Qwen/Qwen3.6-35B-A3B (BF16), not the FP8
# variant we serve. Architecture + tokenizer match so the pairing should
# work — if vLLM rejects it, use the BF16 target instead.
#
# Usage: docker compose --env-file ../../.env -f docker-compose.vllm-35b-fp8-dflash-rtx.yml up -d
# API endpoint: http://localhost:11435/v1
# Model name served as: qwen3.6-35b
#
# Refs:
#   https://huggingface.co/z-lab/Qwen3.6-35B-A3B-DFlash
#   https://huggingface.co/Qwen/Qwen3.6-35B-A3B-FP8
#   arXiv:2602.06036

services:
  qwen36-35b-fp8-dflash:
    image: vllm/vllm-openai:cu130-nightly
    container_name: qwen36-35b-fp8-dflash
    restart: unless-stopped

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ipc: host
    dns:
      - 8.8.8.8
      - 8.8.4.4
    shm_size: 64gb

    ulimits:
      memlock: -1
      stack: 67108864

    ports:
      - "11435:11435"

    volumes:
      - huggingface_cache:/root/.cache/huggingface
      - ./qwen3.6_unsloth_chat_template.jinja:/chat_template.jinja:ro

    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - VLLM_LOGGING_LEVEL=${VLLM_LOGGING_LEVEL:-INFO}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - VLLM_ATTENTION_BACKEND=FLASH_ATTN
      - VLLM_USE_FLASHINFER_SAMPLER=0

    command:
      - Qwen/Qwen3.6-35B-A3B-FP8
      - --served-model-name
      - qwen3.6-35b
      - --host
      - "0.0.0.0"
      - --port
      - "11435"
      - --max-model-len
      - "262144"
      - --gpu-memory-utilization
      - "0.90"
      - --reasoning-parser
      - qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --enable-prefix-caching
      - --language-model-only
      - --max-num-batched-tokens
      - "16384"
      - --chat-template
      - /chat_template.jinja
      - --speculative-config
      - '{"method":"dflash","model":"z-lab/Qwen3.6-35B-A3B-DFlash","num_speculative_tokens":15}'

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11435/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 240s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  huggingface_cache:
    name: qwen36_huggingface_cache

networks:
  default:
    name: qwen36-network
