# Qwen3.6-27B-NVFP4 (NVIDIA) + MTP — CONCURRENCY-tuned variant (parallelization study)
#
# Identical to docker-compose.vllm-27b-nvfp4-nvidia-mtp-rtx.yml EXCEPT tuned for
# many concurrent requests instead of single-stream latency:
#   - --max-num-seqs 256  (vs 4)
#   - --max-model-len 32768 (vs 262144) — matches the guidellm workload envelope
#   - --gpu-memory-utilization 0.90 (vs 0.85) — same on both sides
#   - --max-num-batched-tokens 16384 (vs 8192)
#
# Pairs with docker-compose.vllm-27b-fp8-mtp-parallel-rtx.yml for a clean
# FP8-vs-NVFP4 (both + MTP) concurrency comparison. NVFP4 ~18 GB weights leaves
# a larger KV pool than FP8 ~27 GB at the same 0.90 util → higher concurrency
# ceiling is the hypothesis under test.
#
# Loader / KV-cache caveats: see docker-compose.vllm-27b-nvfp4-nvidia-mtp-rtx.yml
# (pip-upgrades vLLM + flashinfer past the docker-hub :nightly bundle at boot).
#
# Usage: docker compose --env-file ../../.env -f docker-compose.vllm-27b-nvfp4-nvidia-mtp-parallel-rtx.yml up -d
# API endpoint: http://localhost:11436/v1  ·  model: qwen3.6-27b

services:
  qwen36-27b-nvfp4-nvidia-mtp-parallel:
    image: vllm/vllm-openai:nightly
    container_name: qwen36-27b-nvfp4-nvidia-mtp-parallel
    restart: unless-stopped

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ipc: host
    dns: ["8.8.8.8", "8.8.4.4"]
    shm_size: 64gb

    ulimits:
      memlock: -1
      stack: 67108864

    ports:
      - "11436:8000"

    volumes:
      - huggingface_cache:/root/.cache/huggingface
      - ./qwen3.6_unsloth_chat_template.jinja:/chat_template.jinja:ro

    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - VLLM_LOGGING_LEVEL=${VLLM_LOGGING_LEVEL:-INFO}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - FLASHINFER_DISABLE_VERSION_CHECK=1
      - VLLM_USE_FLASHINFER_SAMPLER=0

    entrypoint:
      - bash
      - -c
      - |
        set -e
        echo '=== upgrading vLLM + flashinfer (one-time per container start) ==='
        pip install -U --pre vllm --extra-index-url https://wheels.vllm.ai/nightly --quiet
        pip install -U flashinfer-python flashinfer-cubin --quiet
        pip install -U flashinfer-jit-cache --index-url https://flashinfer.ai/whl/nightly/cu130 --quiet
        echo '=== launching vllm serve (MTP qwen3_next_mtp num=1, concurrency-tuned) ==='
        exec vllm serve nvidia/Qwen3.6-27B-NVFP4 \
          --served-model-name qwen3.6-27b \
          --port 8000 \
          --tensor-parallel-size 1 \
          --trust-remote-code \
          --dtype auto \
          --quantization modelopt \
          --language-model-only \
          --gpu-memory-utilization 0.90 \
          --max-model-len 32768 \
          --max-num-seqs 256 \
          --max-num-batched-tokens 16384 \
          --enable-chunked-prefill \
          --async-scheduling \
          --enable-prefix-caching \
          --reasoning-parser qwen3 \
          --enable-auto-tool-choice \
          --tool-call-parser qwen3_coder \
          --chat-template /chat_template.jinja \
          --speculative-config '{"method":"qwen3_next_mtp","num_speculative_tokens":1}'

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 420s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  huggingface_cache:
    name: qwen36_huggingface_cache

networks:
  default:
    name: qwen36-network
