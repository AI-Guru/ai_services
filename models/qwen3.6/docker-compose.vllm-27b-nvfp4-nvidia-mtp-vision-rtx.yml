# Qwen3.6-27B-NVFP4 (NVIDIA) + MTP + VISION — multimodal serving
#
# Differs from docker-compose.vllm-27b-nvfp4-nvidia-mtp-rtx.yml (the text-only
# live config) ONLY in:
#   - container_name suffix -vision
#   - --language-model-only REMOVED → the checkpoint's vision encoder
#     (qwen3_5_vision, ~1.5 GB VRAM) loads, enabling image/video input.
#
# The nvidia/Qwen3.6-27B-NVFP4 checkpoint DOES ship the vision weights (they
# are only suppressed by --language-model-only). Verified 2026-07-01 with
# scripts/test_vision.sh: the model correctly described the reference image.
#
# Chat template: we KEEP the Unsloth template (qwen3.6_unsloth_chat_template
# .jinja) — it already contains the vision markers (vision_start / image_pad /
# vision_end / image_url), so it renders multimodal messages correctly AND
# keeps the fixes it applies over the checkpoint's native template. Do NOT drop
# --chat-template for vision — the native Qwen template has known issues (the
# reason the Unsloth template exists in this repo).
#
# MTP (qwen3_next_mtp N=1) and the pip-upgrade loader are unchanged; see
# docker-compose.vllm-27b-nvfp4-nvidia-mtp-rtx.yml for those + KV-cache caveats.
# Runs at --gpu-memory-utilization 0.60: ~60 GB used incl. the vision encoder,
# ~36 GB free on the shared card.
#
# Usage: docker compose --env-file ../../.env -f docker-compose.vllm-27b-nvfp4-nvidia-mtp-vision-rtx.yml up -d
# API endpoint: http://localhost:11436/v1  ·  model: qwen3.6-27b  (text + image/video)
# First boot: ~5-7 min (pip upgrade + model load + vision encoder + cudagraph + warmup).

services:
  qwen36-27b-nvfp4-nvidia-mtp:
    image: vllm/vllm-openai:nightly
    container_name: qwen36-27b-nvfp4-nvidia-mtp-vision
    restart: unless-stopped

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ipc: host
    dns: ["8.8.8.8", "8.8.4.4"]
    shm_size: 64gb

    ulimits:
      memlock: -1
      stack: 67108864

    ports:
      - "11436:8000"

    volumes:
      - huggingface_cache:/root/.cache/huggingface
      - ./qwen3.6_unsloth_chat_template.jinja:/chat_template.jinja:ro

    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - VLLM_LOGGING_LEVEL=${VLLM_LOGGING_LEVEL:-INFO}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - FLASHINFER_DISABLE_VERSION_CHECK=1
      - VLLM_USE_FLASHINFER_SAMPLER=0

    entrypoint:
      - bash
      - -c
      - |
        set -e
        echo '=== upgrading vLLM + flashinfer (one-time per container start) ==='
        pip install -U --pre vllm --extra-index-url https://wheels.vllm.ai/nightly --quiet
        pip install -U flashinfer-python flashinfer-cubin --quiet
        pip install -U flashinfer-jit-cache --index-url https://flashinfer.ai/whl/nightly/cu130 --quiet
        echo '=== versions ==='
        pip show vllm flashinfer-python flashinfer-jit-cache flashinfer-cubin 2>/dev/null | grep -E 'Name|Version'
        echo '=== launching vllm serve (with MTP qwen3_next_mtp num=1) ==='
        exec vllm serve nvidia/Qwen3.6-27B-NVFP4 \
          --served-model-name qwen3.6-27b \
          --port 8000 \
          --tensor-parallel-size 1 \
          --trust-remote-code \
          --dtype auto \
          --quantization modelopt \
          --gpu-memory-utilization 0.60 \
          --max-model-len 262144 \
          --max-num-seqs 4 \
          --max-num-batched-tokens 8192 \
          --enable-chunked-prefill \
          --async-scheduling \
          --enable-prefix-caching \
          --reasoning-parser qwen3 \
          --enable-auto-tool-choice \
          --tool-call-parser qwen3_coder \
          --chat-template /chat_template.jinja \
          --speculative-config '{"method":"qwen3_next_mtp","num_speculative_tokens":1}'

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 420s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  huggingface_cache:
    name: qwen36_huggingface_cache

networks:
  default:
    name: qwen36-network
