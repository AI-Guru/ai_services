# Qwen3.6-35B-A3B-NVFP4 (NVIDIA) + MTP — retest of NVIDIA's documented
# speculative-decoding recipe on this MoE with the working loader recipe.
#
# Differs from docker-compose.vllm-35b-nvfp4-nvidia-rtx.yml ONLY in:
#   - Port 11438 (vs 11437)
#   - --speculative-config enabled (MTP num=3 with triton drafter backend)
#   - container_name suffix -mtp
# Everything else (pip-upgrade entrypoint, marlin MoE, sampling, etc.) is
# identical to keep the A/B comparison clean.
#
# !! BIG WIN on 2026-06-01: MTP gives +55% throughput on the NVIDIA NVFP4
# checkpoint with vLLM 0.22.1rc1.dev31+ (367.7 vs 238.0 tok/s overall on
# test_scenarios, RTX PRO 6000 Blackwell). TTFT drops ~34% across the
# board. This OVERTURNS the 2026-04-23 finding that MTP gave no speedup
# on Qwen3.6-35B-A3B — that test was on the FP8 checkpoint with an older
# vLLM whose MTP integration was incomplete. Different checkpoint + new
# vLLM = night-and-day.
#
# Per-scenario gains (no-MTP -> MTP, both NVIDIA NVFP4):
#   Chat            230.0 -> 325.9  (+42%)
#   RAG             229.1 -> 397.8  (+74%)
#   Codegen         241.5 -> 352.3  (+46%)
#   Summarization   236.6 -> 380.3  (+61%)
#   Agentic         253.1 -> 382.2  (+51%)
#   OVERALL         238.0 -> 367.7  (+55%)
#
# Versus the Unsloth NVFP4 baseline (170.4 tok/s) this is +116% — more
# than 2x faster. Recommended default for the 35B Qwen3.6 deployment.
#
# Sample recipe from NVIDIA card:
#   --speculative-config '{"method":"mtp","num_speculative_tokens":3,"moe_backend":"triton"}'
#
# Loader recipe: see docker-compose.vllm-35b-nvfp4-nvidia-rtx.yml header.
# Container entrypoint pip-upgrades vLLM + flashinfer past the docker-hub
# :nightly bundle.
#
# Usage: docker compose --env-file ../../.env -f docker-compose.vllm-35b-nvfp4-nvidia-mtp-rtx.yml up -d
# API endpoint: http://localhost:11438/v1
# Model name served as: nvidia/Qwen3.6-35B-A3B-NVFP4
# First boot: ~5-7 min (pip upgrade + model load + cudagraph + warmup + MTP
# draft head warmup).

services:
  qwen36-35b-nvfp4-nvidia-mtp:
    image: vllm/vllm-openai:nightly
    container_name: qwen36-35b-nvfp4-nvidia-mtp
    restart: unless-stopped

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ipc: host
    dns: ["8.8.8.8", "8.8.4.4"]
    shm_size: 64gb

    ulimits:
      memlock: -1
      stack: 67108864

    ports:
      - "11438:8000"

    volumes:
      - huggingface_cache:/root/.cache/huggingface

    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - VLLM_LOGGING_LEVEL=${VLLM_LOGGING_LEVEL:-INFO}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - FLASHINFER_DISABLE_VERSION_CHECK=1
      - VLLM_USE_FLASHINFER_MOE_FP4=0

    entrypoint:
      - bash
      - -c
      - |
        set -e
        echo '=== upgrading vLLM + flashinfer (one-time per container start) ==='
        pip install -U --pre vllm --extra-index-url https://wheels.vllm.ai/nightly --quiet
        pip install -U flashinfer-python flashinfer-cubin --quiet
        pip install -U flashinfer-jit-cache --index-url https://flashinfer.ai/whl/nightly/cu130 --quiet
        echo '=== versions ==='
        pip show vllm flashinfer-python flashinfer-jit-cache flashinfer-cubin 2>/dev/null | grep -E 'Name|Version'
        echo '=== launching vllm serve (with MTP num=3, triton drafter) ==='
        exec vllm serve nvidia/Qwen3.6-35B-A3B-NVFP4 \
          --served-model-name qwen3.6-35b \
          --port 8000 \
          --tensor-parallel-size 1 \
          --trust-remote-code \
          --dtype auto \
          --quantization modelopt \
          --moe-backend marlin \
          --gpu-memory-utilization 0.85 \
          --max-model-len 65536 \
          --max-num-seqs 4 \
          --max-num-batched-tokens 8192 \
          --enable-chunked-prefill \
          --async-scheduling \
          --enable-prefix-caching \
          --reasoning-parser qwen3 \
          --speculative-config '{"method":"mtp","num_speculative_tokens":3,"moe_backend":"triton"}'

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 420s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  huggingface_cache:
    name: qwen36_huggingface_cache

networks:
  default:
    name: qwen36-network
