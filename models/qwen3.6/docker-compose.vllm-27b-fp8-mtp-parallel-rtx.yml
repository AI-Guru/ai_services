# Qwen3.6-27B FP8 + MTP — CONCURRENCY-tuned variant (parallelization study)
#
# Identical to docker-compose.vllm-27b-fp8-textonly-rtx.yml EXCEPT tuned for
# many concurrent requests instead of single-stream latency:
#   - --max-num-seqs 256  (vs 4)      — allow a deep running batch
#   - --max-model-len 32768 (vs 262144) — matches the guidellm workload envelope
#     (max scenario ~16K in + 800 out); keeps the A/B identical to the NVFP4 side
#   - --gpu-memory-utilization 0.90    — same on both sides; the KV-pool size that
#     remains after weights is the variable under test (FP8 ~27 GB weights vs
#     NVFP4 ~18 GB → NVFP4 gets a larger KV pool / higher concurrency ceiling)
#
# Pairs with docker-compose.vllm-27b-nvfp4-nvidia-mtp-parallel-rtx.yml for a
# clean FP8-vs-NVFP4 (both + MTP) concurrency comparison. Same official Qwen
# FP8 checkpoint, same qwen3_next_mtp N=1 speculator, text-only.
#
# KV cache stays BF16/auto (--kv-cache-dtype fp8_e4m3 omitted; DeltaNet #26646).
#
# Usage: docker compose --env-file ../../.env -f docker-compose.vllm-27b-fp8-mtp-parallel-rtx.yml up -d
# API endpoint: http://localhost:11436/v1  ·  model: qwen3.6-27b

services:
  qwen36-27b-fp8-mtp-parallel:
    image: vllm/vllm-openai:v0.19.0-cu130
    container_name: qwen36-27b-fp8-mtp-parallel
    restart: unless-stopped

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ipc: host
    dns: ["8.8.8.8", "8.8.4.4"]
    shm_size: 64gb

    ulimits:
      memlock: -1
      stack: 67108864

    ports:
      - "11436:11436"

    volumes:
      - huggingface_cache:/root/.cache/huggingface
      - ./qwen3.6_unsloth_chat_template.jinja:/chat_template.jinja:ro

    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - VLLM_LOGGING_LEVEL=${VLLM_LOGGING_LEVEL:-INFO}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - VLLM_ATTENTION_BACKEND=FLASH_ATTN
      - VLLM_USE_FLASHINFER_SAMPLER=0

    command:
      - Qwen/Qwen3.6-27B-FP8
      - --served-model-name
      - qwen3.6-27b
      - --host
      - "0.0.0.0"
      - --port
      - "11436"
      - --max-model-len
      - "32768"
      - --gpu-memory-utilization
      - "0.90"
      - --reasoning-parser
      - qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --enable-prefix-caching
      - --enable-chunked-prefill
      - --language-model-only
      - --max-num-seqs
      - "256"
      - --max-num-batched-tokens
      - "16384"
      - --chat-template
      - /chat_template.jinja
      - --speculative-config
      - '{"method":"qwen3_next_mtp","num_speculative_tokens":1}'

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11436/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 240s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  huggingface_cache:
    name: qwen36_huggingface_cache

networks:
  default:
    name: qwen36-network
