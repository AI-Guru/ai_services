# Qwen3.6-27B-FP8 — official Qwen pre-quantized FP8 dense model
#
# Uses Qwen/Qwen3.6-27B-FP8: fine-grained block-wise FP8 (block=128),
# quantized by the Qwen team — including DeltaNet layers — so no runtime
# quantization surprises. vLLM reads the quant config from the model directly.
#
# Architecture: dense 27B, 64 hybrid layers = 16 × (3×Gated DeltaNet + 1×full
# Gated Attention) → 48 DeltaNet + 16 full attention. All 27B params active
# per token (unlike the 35B MoE with 3B active).
#
# RTX PRO 6000 Blackwell (96 GB, SM 120) runs block-wise FP8 as W8A8 natively.
# Weights: ~27 GB vs ~54 GB BF16 → ~60 GB free for KV cache at 0.90 util.
# Expect bandwidth-bound decode at ~50-80 tok/s (27 GB active / 1.6 TB/s).
#
# Note: --kv-cache-dtype fp8_e4m3 is omitted — vLLM bug with DeltaNet layers
# (vllm-project/vllm#26646); re-enable once upstream fix lands.
#
# Usage: docker compose -f docker-compose.vllm-27b-fp8-rtx.yml up -d
# API endpoint: http://localhost:11436/v1
# Model name served as: qwen3.6-27b

services:
  qwen36-27b-fp8:
    image: vllm/vllm-openai:v0.19.0-cu130
    container_name: qwen36-27b-fp8
    restart: unless-stopped

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ipc: host
    dns:
      - 8.8.8.8
      - 8.8.4.4
    shm_size: 64gb

    ulimits:
      memlock: -1
      stack: 67108864

    ports:
      - "11436:11436"

    volumes:
      - huggingface_cache:/root/.cache/huggingface
      - ./qwen3.6_chat_template.jinja:/chat_template.jinja:ro

    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - VLLM_LOGGING_LEVEL=${VLLM_LOGGING_LEVEL:-INFO}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - VLLM_ATTENTION_BACKEND=FLASH_ATTN
      - VLLM_USE_FLASHINFER_SAMPLER=0

    command:
      - Qwen/Qwen3.6-27B-FP8
      - --served-model-name
      - qwen3.6-27b
      - --host
      - "0.0.0.0"
      - --port
      - "11436"
      - --max-model-len
      - "262144"
      - --gpu-memory-utilization
      - "0.90"
      - --reasoning-parser
      - qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --enable-prefix-caching
      - --max-num-batched-tokens
      - "16384"
      - --chat-template
      - /chat_template.jinja

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11436/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  huggingface_cache:
    name: qwen36_huggingface_cache

networks:
  default:
    name: qwen36-network
