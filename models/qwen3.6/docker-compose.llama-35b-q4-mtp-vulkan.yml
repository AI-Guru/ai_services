# Qwen3.6-35B-A3B (MoE) GGUF UD-Q4_K_XL + MTP via llama.cpp Vulkan — AMD R9700 (32 GB)
#
# unsloth/Qwen3.6-35B-A3B-MTP-GGUF · UD-Q4_K_XL (~22.9 GB).
#
# Context capped at 32K to fit comfortably in 32 GB.
# MTP + Vulkan combination is EXPERIMENTAL — see 27b-q4-mtp file for caveats.
#
# NOTE on 35B-A3B + MTP: the CUDA README notes MTP gives no measurable speedup
# on 35B-A3B because only ~3B params are active per token (draft+verify cost
# eats the spec gain). Same is likely true on Vulkan. Include for parity.
#
# Usage: docker compose -f docker-compose.llama-35b-q4-mtp-vulkan.yml up -d
# API endpoint: http://localhost:11447/v1

services:
  qwen36-35b-q4-mtp-vulkan:
    image: llama.cpp-mtp-vulkan:latest
    container_name: qwen36-35b-q4-mtp-vulkan
    restart: unless-stopped

    devices:
      - /dev/kfd
      - /dev/dri

    group_add:
      - "44"
      - "992"

    ports:
      - "11447:11447"

    volumes:
      - model_cache:/root/.cache/huggingface

    environment:
      - LLAMA_CACHE=/root/.cache/huggingface/llama.cpp

    command:
      - --hf-repo
      - unsloth/Qwen3.6-35B-A3B-MTP-GGUF
      - --hf-file
      - Qwen3.6-35B-A3B-UD-Q4_K_XL.gguf
      - -ngl
      - "99"
      - -c
      - "32768"
      - -np
      - "1"
      - -fa
      - "on"
      - --cache-type-k
      - q8_0
      - --cache-type-v
      - q8_0
      - --jinja
      - --spec-type
      - draft-mtp
      - --spec-draft-n-max
      - "3"
      - --host
      - "0.0.0.0"
      - --port
      - "11447"
      - -a
      - qwen3.6-35b

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11447/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 900s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  model_cache:
    name: qwen36_huggingface_cache

networks:
  default:
    name: qwen36-network
