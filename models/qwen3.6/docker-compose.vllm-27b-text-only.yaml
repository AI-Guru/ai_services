# Qwen3.6-27B — BF16, 262K context, vision encoder disabled
#
# Dense 27B in full BF16 (~54 GB weights). Tight fit on 96 GB at 262K context:
# ~14-16 GB free for KV cache after weights. Hybrid attention keeps the KV
# footprint small (only 16 of 64 layers have full attention).
#
# Architecture: dense 27B, 64 hybrid layers (48 DeltaNet + 16 full attention).
#
# Usage: docker compose -f docker-compose.vllm-27b-text-only.yaml up -d
# API endpoint: http://localhost:11436/v1
# Model name served as: qwen3.6-27b

services:
  qwen36-27b-text:
    image: vllm/vllm-openai:v0.19.0-cu130
    container_name: qwen36-27b-text
    restart: unless-stopped

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ipc: host
    dns:
      - 8.8.8.8
      - 8.8.4.4
    shm_size: 64gb

    ulimits:
      memlock: -1
      stack: 67108864

    ports:
      - "11436:11436"

    volumes:
      - huggingface_cache:/root/.cache/huggingface
      - ./qwen3.6_unsloth_chat_template.jinja:/chat_template.jinja:ro

    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - VLLM_LOGGING_LEVEL=${VLLM_LOGGING_LEVEL:-INFO}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - VLLM_ATTENTION_BACKEND=FLASH_ATTN
      - VLLM_USE_FLASHINFER_SAMPLER=0

    command:
      - Qwen/Qwen3.6-27B
      - --served-model-name
      - qwen3.6-27b
      - --host
      - "0.0.0.0"
      - --port
      - "11436"
      - --max-model-len
      - "262144"
      - --gpu-memory-utilization
      - "0.88"
      - --reasoning-parser
      - qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --enable-prefix-caching
      - --language-model-only
      - --max-num-batched-tokens
      - "16384"
      - --chat-template
      - /chat_template.jinja

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11436/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  huggingface_cache:
    name: qwen36_huggingface_cache

networks:
  default:
    name: qwen36-network
