# Qwen3.6-35B-A3B-NVFP4 (unsloth) — official Unsloth NVFP4 quantization
#
# Target: unsloth/Qwen3.6-35B-A3B-NVFP4
#   - NVFP4 4-bit float quantization of the MoE 35B-A3B (256 experts,
#     8 routed + 1 shared per token, 3B active).
#   - Calibrated on HF UltraChat (~2M-token budget, up to 16K ctx).
#   - Reported impact (per Unsloth card): GSM8K 0.23, MMLU-Pro 0.58
#     (vs BF16 reference GSM8K 0.17, MMLU-Pro 0.61).
#   - Checkpoint includes MTP weights, but MTP is NOT enabled here — see
#     speculative-decoding note below.
#
# Architecture: hybrid 30 Gated DeltaNet + 10 full-attention layers in
# 10×(3×(DeltaNet→MoE) + 1×(GatedAttn→MoE)) layout. 35B total / 3B active.
#
# Memory: NVFP4 weights ~17-18 GB on disk. On RTX PRO 6000 Blackwell (96 GB,
# SM 120), expect ample KV-cache headroom for long contexts and concurrency.
#
# Speculative decoding intentionally OFF: MTP was tested on Qwen3.6-35B-A3B-FP8
# on 2026-04-23 and gave NO speedup (201.7 vs 203.2 tok/s baseline). MoE
# decode is already cheap (~3B active), so draft+verify overhead eats the
# speculative gain. The dense 27B benefits (+41%) but this MoE 35B does not.
# Same logic applies here regardless of weight quantization (NVFP4 vs FP8).
# If you want to retest MTP on this checkpoint, swap to SGLang per the
# Unsloth recipe.
#
# Upstream recipe (https://huggingface.co/unsloth/Qwen3.6-35B-A3B-NVFP4):
#   vllm serve unsloth/Qwen3.6-35B-A3B-NVFP4 --trust-remote-code --dtype bfloat16
# Native ctx 262144; extensible to ~1M with YaRN (not enabled here).
#
# Sampling: thinking-mode-coding profile (temp=0.6, top_p=0.95, top_k=20),
# matching the other Qwen3.6-27B NVFP4 unsloth compose for fair A/B against
# the dense sibling. Thinking mode on by default; preserve_thinking=true.
#
# KV-cache caveat: do NOT set --kv-cache-dtype fp8_e4m3 on Qwen3.6 hybrid
# DeltaNet (vllm-project/vllm#26646 — silent corruption). Leave KV at BF16.
#
# Requires Blackwell GPUs (SM_120) for hardware-accelerated NVFP4 tensor
# cores. RTX PRO 6000 Blackwell expected.
#
# Usage: docker compose --env-file ../../.env -f docker-compose.vllm-35b-nvfp4-unsloth-rtx.yml up -d
# API endpoint: http://localhost:11435/v1
# Model name served as: qwen3.6-35b

services:
  qwen36-35b-nvfp4-unsloth:
    image: vllm/vllm-openai:cu130-nightly
    container_name: qwen36-35b-nvfp4-unsloth
    restart: unless-stopped

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ipc: host
    dns: ["8.8.8.8", "8.8.4.4"]
    shm_size: 64gb

    ulimits:
      memlock: -1
      stack: 67108864

    ports:
      - "11435:11435"

    volumes:
      - huggingface_cache:/root/.cache/huggingface
      - ./qwen3.6_unsloth_chat_template.jinja:/chat_template.jinja:ro

    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - VLLM_LOGGING_LEVEL=${VLLM_LOGGING_LEVEL:-INFO}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - VLLM_ATTENTION_BACKEND=FLASH_ATTN
      - VLLM_USE_FLASHINFER_SAMPLER=0

    command:
      - unsloth/Qwen3.6-35B-A3B-NVFP4
      - --served-model-name
      - qwen3.6-35b
      - --host
      - "0.0.0.0"
      - --port
      - "11435"
      - --trust-remote-code
      - --dtype
      - bfloat16
      - --max-model-len
      - "262144"
      - --gpu-memory-utilization
      - "0.90"
      - --reasoning-parser
      - qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --enable-prefix-caching
      - --max-num-batched-tokens
      - "16384"
      - --chat-template
      - /chat_template.jinja
      - --default-chat-template-kwargs
      - '{"enable_thinking": true, "preserve_thinking": true}'
      - --override-generation-config
      - '{"temperature": 0.6, "top_p": 0.95, "top_k": 20, "min_p": 0.0, "presence_penalty": 0.0, "repetition_penalty": 1.0}'

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11435/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  huggingface_cache:
    name: qwen36_huggingface_cache

networks:
  default:
    name: qwen36-network
