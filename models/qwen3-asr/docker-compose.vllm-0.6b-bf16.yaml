# Qwen3-ASR-0.6B — lightweight ASR for high-concurrency batch (any CUDA GPU)
#
# Generic-hardware flavor of docker-compose.vllm-0.6b-bf16-rtx.yml. The 0.6B
# variant is small enough (~1.2 GB BF16) to run on consumer GPUs (RTX 4090,
# 3090, even 12 GB cards in pinch). gpu-memory-utilization stays at 0.30 by
# default — raise it to 0.85 on small cards to fit more KV cache.
#
# See docker-compose.vllm-0.6b-bf16-rtx.yml for full model notes / vendor WER.
#
# Hardware: any CUDA 12.x GPU with ≥6 GB VRAM. For ≥40 GB cards, bump
# --max-num-seqs to 256+ to fully exploit the model's batch headroom.
#
# Usage: docker compose -f docker-compose.vllm-0.6b-bf16.yaml up -d
# API endpoint: http://localhost:11438/v1
# Model name served as: qwen3-asr-0.6b

services:
  qwen3asr-0.6b:
    image: vllm/vllm-openai:nightly
    container_name: qwen3asr-0.6b
    restart: unless-stopped

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ipc: host
    dns:
      - 8.8.8.8
      - 8.8.4.4
    shm_size: 16gb

    ulimits:
      memlock: -1
      stack: 67108864

    ports:
      - "11438:11438"

    volumes:
      - huggingface_cache:/root/.cache/huggingface

    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - VLLM_LOGGING_LEVEL=${VLLM_LOGGING_LEVEL:-INFO}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True

    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        pip install -q --no-cache-dir librosa soundfile && \
        exec python3 -m vllm.entrypoints.openai.api_server \
          --model Qwen/Qwen3-ASR-0.6B \
          --served-model-name qwen3-asr-0.6b \
          --host 0.0.0.0 \
          --port 11438 \
          --gpu-memory-utilization 0.85 \
          --max-num-seqs 128 \
          --trust-remote-code

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11438/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 240s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  huggingface_cache:
    name: qwen3asr_huggingface_cache

networks:
  default:
    name: qwen3asr-network
