# Qwen3.5-35B-A3B-GPTQ-Int4 — official Qwen 4-bit quantized MoE model
#
# Uses Qwen/Qwen3.5-35B-A3B-GPTQ-Int4: GPTQ 4-bit quantization by the
# Qwen team. 35B total parameters, ~3B active per token.
# Hybrid Gated DeltaNet + MoE architecture (linear + full attention, 3:1).
#
# RTX PRO 6000 Blackwell (96 GB, SM 120):
# Weights: ~20 GB GPTQ-Int4 → ~66 GB free for KV cache at 0.90 util.
# Nearly double the KV cache headroom vs FP8 (~61 GB), which should
# significantly improve concurrent request capacity.
#
# --enforce-eager is required: CUDA graph capture fails on this hybrid
# Mamba+MoE architecture.
#
# Note: --kv-cache-dtype fp8_e4m3 is omitted — same Mamba layer bug as the
# FP8 variant (vllm-project/vllm#26646).
#
# Usage: docker compose -f docker-compose.vllm-35b-gptq-int4-rtx.yml -p qwen35-gptq-int4 up -d
# API endpoint: http://localhost:11435/v1
# Model name served as: qwen3.5-35b

services:
  qwen35-gptq-int4:
    image: vllm/vllm-openai:v0.17.0-cu130
    container_name: qwen35-gptq-int4
    restart: unless-stopped

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ipc: host
    dns:
      - 8.8.8.8
      - 8.8.4.4
    shm_size: 64gb

    ulimits:
      memlock: -1
      stack: 67108864

    ports:
      - "11435:11435"

    volumes:
      - huggingface_cache:/root/.cache/huggingface

    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - VLLM_LOGGING_LEVEL=${VLLM_LOGGING_LEVEL:-INFO}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - VLLM_ATTENTION_BACKEND=FLASH_ATTN
      - VLLM_USE_FLASHINFER_SAMPLER=0

    command:
      - Qwen/Qwen3.5-35B-A3B-GPTQ-Int4
      - --served-model-name
      - qwen3.5-35b
      - --host
      - "0.0.0.0"
      - --port
      - "11435"
      - --dtype
      - float16
      - --max-model-len
      - "262144"
      - --gpu-memory-utilization
      - "0.90"
      - --reasoning-parser
      - qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --enable-prefix-caching
      - --enforce-eager
      - --quantization
      - gptq_marlin
      - --max-num-batched-tokens
      - "16384"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11435/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  huggingface_cache:
    name: qwen35_huggingface_cache

networks:
  default:
    name: qwen35-network
