# Qwen3.5-35B-A3B (MoE, 3B active) via llama.cpp + TurboQuant KV cache
#
# Uses Google's TurboQuant (PolarQuant + Walsh-Hadamard rotation) for ~4.6x
# KV cache compression at ~3.5 bits/value — near-lossless on long-context
# tasks per community benchmarks on Qwen 3.5 35B.
#
# Built from mudler/llama.cpp feat/turbo-quant branch which adds native
# tbq3_0/tbq4_0 KV cache types with CUDA support.
#
# CUDA backend is experimental. If tbq3_0 fails at runtime, switch to q4_0
# (4 bits, 4x compression) as the closest mainline fallback.
#
# Patched jinja template fixes the developer role crash that affects coding
# agents (Claude Code, OpenCode, Cursor).
#
# The GGUF model (~21 GB) is downloaded automatically on first start.
#
# Build: docker compose -f docker-compose.llama-35b-turboquant-rtx.yml build
# Start: docker compose -f docker-compose.llama-35b-turboquant-rtx.yml up -d
# API:   http://localhost:11435/v1
#
# Refs:
#   https://research.google/blog/turboquant-redefining-ai-efficiency-with-extreme-compression/
#   https://github.com/ggml-org/llama.cpp/discussions/20969
#   https://github.com/mudler/llama.cpp/tree/feat/turbo-quant

services:
  llama-server:
    build:
      context: .
      dockerfile: Dockerfile.turboquant
    image: llama-turboquant:latest
    container_name: qwen35-llama-35b-turboquant
    restart: unless-stopped

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ports:
      - "11435:11435"

    volumes:
      - model_cache:/root/.cache/huggingface
      - ./qwen3.5_chat_template.jinja:/template.jinja:ro

    environment:
      - LLAMA_CACHE=/root/.cache/huggingface/llama.cpp

    command:
      - --hf-repo
      - unsloth/Qwen3.5-35B-A3B-GGUF
      - --hf-file
      - Qwen3.5-35B-A3B-UD-Q4_K_XL.gguf
      - -ngl
      - "99"
      - -c
      - "262144"
      - -np
      - "1"
      - -fa
      - "on"
      # TurboQuant tbq3_0 CUDA kernels not yet ready (SET_ROWS op missing).
      # Using q4_0 (4 bits/val, 4x compression) as best available fallback.
      # Switch to tbq3_0 once CUDA support lands in the fork.
      - --cache-type-k
      - q4_0
      - --cache-type-v
      - q4_0
      - --host
      - "0.0.0.0"
      - --port
      - "11435"
      - --chat-template-file
      - /template.jinja
      - -a
      - qwen3.5-35b-turboquant

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11435/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  model_cache:
    name: qwen35_huggingface_cache
    external: true
