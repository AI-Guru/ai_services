# Qwen-AgentWorld-35B-A3B (FP8) via SGLang — COMMUNITY quant, NOT first-party
#
# ⚠️  lovedheart/Qwen-AgentWorld-35B-A3B-FP8 is a third-party community FP8 quant
#     (~35 GB). Qwen has NOT published an official FP8 of AgentWorld. This quant is
#     unvetted and may fail to load. If it crash-loops, prefer the first-party BF16
#     file (docker-compose.sglang-35b-bf16.yaml).
#
# AgentWorld = Qwen's agentic world model, a fine-tune of Qwen3.5-35B-A3B-Base:
# 40 layers (30 Gated DeltaNet + 10 full Gated-Attention), 256 experts
# (8 routed + 1 shared), 35B total / 3B active, 262K context, text-only.
# Thinking-on by default; recommended temp=0.6 top_p=0.95 top_k=20.
#
# Important: FP8 KV cache produces silent corrupt output when DeltaNet linear
# attention state interacts with FP8-quantized KV. kv-cache-dtype is pinned to bf16
# and mamba-ssm-dtype to bfloat16. Do not change these. FP8 here means FP8 *weights*
# (via --fp8-gemm-backend triton), not FP8 KV cache.
#
# SGLang RadixAttention (prefix caching) is on by default. "HiRadixCache only
# supports MHA and MLA" startup warning is expected (DeltaNet) and non-fatal.
#
# No speculative/MTP flags by default (see the BF16 file's note to enable NEXTN).
#
# Usage: docker compose -f docker-compose.sglang-35b-fp8.yaml up -d
# API endpoint: http://localhost:11450/v1
# Model name served as: agentworld-35b

services:
  agentworld-sglang-fp8:
    image: lmsysorg/sglang:latest
    container_name: agentworld-sglang-fp8
    restart: unless-stopped

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ipc: host
    dns:
      - 8.8.8.8
      - 8.8.4.4
    shm_size: 64gb

    ulimits:
      memlock: -1
      stack: 67108864

    ports:
      - "11450:11450"

    volumes:
      - huggingface_cache:/root/.cache/huggingface

    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - PYTORCH_ALLOC_CONF=expandable_segments:True
      - SGLANG_ENABLE_JIT_DEEPGEMM=0

    entrypoint: python3 -m sglang.launch_server
    command:
      - --model-path
      - lovedheart/Qwen-AgentWorld-35B-A3B-FP8
      - --served-model-name
      - agentworld-35b
      - --host
      - "0.0.0.0"
      - --port
      - "11450"
      - --context-length
      - "262144"
      - --mem-fraction-static
      - "0.80"
      - --tp-size
      - "1"
      - --attention-backend
      - triton
      - --fp8-gemm-backend
      - triton
      - --kv-cache-dtype
      - bf16
      - --mamba-ssm-dtype
      - bfloat16
      - --trust-remote-code
      - --reasoning-parser
      - qwen3
      - --tool-call-parser
      - qwen3_coder
      - --max-running-requests
      - "20"

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11450/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 240s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  huggingface_cache:
    name: agentworld_huggingface_cache

networks:
  default:
    name: agentworld-network
