# Qwen-AgentWorld-35B-A3B (FP8) via vLLM — COMMUNITY quant, NOT first-party
#
# ⚠️  lovedheart/Qwen-AgentWorld-35B-A3B-FP8 is a third-party community FP8 quant
#     (~35 GB). Qwen has NOT published an official FP8 of AgentWorld. This quant is
#     unvetted and may fail to load (DeltaNet/Mamba layers sometimes carry extra or
#     renamed weight keys the vLLM build doesn't expect). If it crash-loops, prefer
#     the first-party BF16 file (docker-compose.vllm-35b-bf16-rtx.yml).
#
# AgentWorld = Qwen's agentic world model, a fine-tune of Qwen3.5-35B-A3B-Base:
# 40 layers (30 Gated DeltaNet + 10 full Gated-Attention), 256 experts
# (8 routed + 1 shared), 35B total / 3B active, 262K context, text-only.
# Thinking-on by default; recommended temp=0.6 top_p=0.95 top_k=20.
#
# FP8 weights (~35 GB) leave far more KV headroom than BF16 and decode faster.
# Note: --kv-cache-dtype fp8_e4m3 is NOT set — FP8 KV cache silently corrupts
# output on DeltaNet layers (vllm-project/vllm#26646). Leave KV at auto/bf16.
#
# AgentWorld's config declares the multimodal class Qwen3_5MoeForConditionalGeneration
# but ships NO vision weights (text-only). --language-model-only skips the vision
# tower; without it vLLM errors on uninitialized visual.* weights. Needs v0.19.0-cu130.
#
# Usage: docker compose -f docker-compose.vllm-35b-fp8-rtx.yml up -d
# API endpoint: http://localhost:11450/v1
# Model name served as: agentworld-35b

services:
  agentworld-vllm-fp8:
    image: vllm/vllm-openai:v0.19.0-cu130
    container_name: agentworld-vllm-fp8
    restart: unless-stopped

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ipc: host
    dns:
      - 8.8.8.8
      - 8.8.4.4
    shm_size: 64gb

    ulimits:
      memlock: -1
      stack: 67108864

    ports:
      - "11450:11450"

    volumes:
      - huggingface_cache:/root/.cache/huggingface

    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - VLLM_LOGGING_LEVEL=${VLLM_LOGGING_LEVEL:-INFO}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - VLLM_ATTENTION_BACKEND=FLASH_ATTN
      - VLLM_USE_FLASHINFER_SAMPLER=0

    command:
      - lovedheart/Qwen-AgentWorld-35B-A3B-FP8
      - --served-model-name
      - agentworld-35b
      - --host
      - "0.0.0.0"
      - --port
      - "11450"
      - --max-model-len
      - "262144"
      - --gpu-memory-utilization
      - "0.90"
      - --trust-remote-code
      - --language-model-only
      - --reasoning-parser
      - qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --enable-prefix-caching
      - --max-num-batched-tokens
      - "16384"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11450/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 240s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  huggingface_cache:
    name: agentworld_huggingface_cache

networks:
  default:
    name: agentworld-network
