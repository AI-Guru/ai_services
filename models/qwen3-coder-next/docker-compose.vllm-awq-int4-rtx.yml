# Qwen3-Coder-Next AWQ-4bit — community quantized coding MoE model
#
# Uses bullpoint/Qwen3-Coder-Next-AWQ-4bit: AWQ 4-bit quantization,
# 80B total / 3B active per token, 512 experts, 10 active.
# Coding specialist: 70.6–71.3% on SWE-bench Verified.
#
# RTX PRO 6000 Blackwell (96 GB, SM 120):
# Weights: ~45 GB AWQ-4bit → ~41 GB free for KV cache at 0.90 util.
# CUDA graphs work (no --enforce-eager needed) — unlike Qwen3.5 GPTQ.
#
# Usage: docker compose -f docker-compose.vllm-awq-int4-rtx.yml up -d
# API endpoint: http://localhost:11438/v1
# Model name served as: qwen3-coder-next

name: qwen3-coder-next-vllm

services:
  qwen3-coder-next-awq:
    image: vllm/vllm-openai:v0.17.0-cu130
    container_name: qwen3-coder-next-awq
    restart: unless-stopped

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ipc: host
    dns:
      - 8.8.8.8
      - 8.8.4.4
    shm_size: 64gb

    ulimits:
      memlock: -1
      stack: 67108864

    ports:
      - "11438:11438"

    volumes:
      - huggingface_cache:/root/.cache/huggingface

    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - VLLM_LOGGING_LEVEL=${VLLM_LOGGING_LEVEL:-INFO}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - VLLM_ATTENTION_BACKEND=FLASH_ATTN
      - VLLM_USE_FLASHINFER_SAMPLER=0

    command:
      - bullpoint/Qwen3-Coder-Next-AWQ-4bit
      - --served-model-name
      - qwen3-coder-next
      - --host
      - "0.0.0.0"
      - --port
      - "11438"
      - --max-model-len
      - "131072"
      - --gpu-memory-utilization
      - "0.90"
      - --reasoning-parser
      - qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --enable-prefix-caching
      - --max-num-batched-tokens
      - "16384"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11438/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  huggingface_cache:
    name: qwen35_huggingface_cache
    external: true
