# Qwen3-Reranker-4B — cross-encoder reranker / scorer (vLLM, RTX)
#
# Reranks (query, document) pairs and returns a 0–1 relevance score.
# Built on Qwen3-4B; vLLM converts the CausalLM into a sequence-classification
# head via --hf-overrides (see the 0.6B config header for the rationale).
#
# Apache 2.0, NOT gated — HF_TOKEN optional. ~8 GB weights,
# gpu-memory-utilization 0.12 (~11.5 GB of 96 GB).
#
# Usage: docker compose -f docker-compose.vllm-rerank-4b-rtx.yml up -d
# Score API:  POST http://localhost:11467/v1/score
# Rerank API: POST http://localhost:11467/rerank
# Model name served as: qwen3-reranker-4b

services:
  qwen3-reranker-4b:
    image: vllm/vllm-openai:v0.22.0-cu129-ubuntu2404
    container_name: qwen3-reranker-4b
    restart: unless-stopped
    ipc: host
    dns:
      - 8.8.8.8
      - 8.8.4.4
    shm_size: 16gb

    ulimits:
      memlock: -1
      stack: 67108864

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ports:
      - "11467:11467"

    volumes:
      - huggingface_cache:/root/.cache/huggingface

    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - VLLM_LOGGING_LEVEL=${VLLM_LOGGING_LEVEL:-INFO}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True

    command:
      - Qwen/Qwen3-Reranker-4B
      - --served-model-name
      - qwen3-reranker-4b
      - --runner
      - pooling
      - --hf-overrides
      - '{"architectures":["Qwen3ForSequenceClassification"],"classifier_from_token":["no","yes"],"is_original_qwen3_reranker":true}'
      - --host
      - "0.0.0.0"
      - --port
      - "11467"
      - --max-model-len
      - "16384"
      - --gpu-memory-utilization
      - "0.12"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11467/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 240s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  huggingface_cache:
    name: qwen3embedding_huggingface_cache

networks:
  default:
    name: qwen3-embedding-network
