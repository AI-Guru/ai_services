# Qwen3-Embedding-0.6B — text embedding model (vLLM, RTX)
#
# Last-token-pooling embedding model built on Qwen3-0.6B (Qwen3ForCausalLM).
# Output dim 1024 (MRL: any 32–1024 via the `dimensions` request field).
# Apache 2.0, NOT gated — HF_TOKEN optional.
#
# Tiny (~1.2 GB weights); gpu-memory-utilization 0.05 (~4.8 GB of 96 GB) so it
# co-hosts comfortably alongside a primary chat model.
#
# Usage: docker compose -f docker-compose.vllm-embed-0.6b-rtx.yml up -d
# Embeddings API: POST http://localhost:11463/v1/embeddings
# Model name served as: qwen3-embedding-0.6b

services:
  qwen3-embedding-0-6b:
    image: vllm/vllm-openai:v0.22.0-cu129-ubuntu2404
    container_name: qwen3-embedding-0-6b
    restart: unless-stopped
    ipc: host
    dns:
      - 8.8.8.8
      - 8.8.4.4
    shm_size: 16gb

    ulimits:
      memlock: -1
      stack: 67108864

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ports:
      - "11463:11463"

    volumes:
      - huggingface_cache:/root/.cache/huggingface

    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - VLLM_LOGGING_LEVEL=${VLLM_LOGGING_LEVEL:-INFO}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True

    command:
      - Qwen/Qwen3-Embedding-0.6B
      - --served-model-name
      - qwen3-embedding-0.6b
      - --runner
      - pooling
      - --hf-overrides
      - '{"is_matryoshka":true}'
      - --host
      - "0.0.0.0"
      - --port
      - "11463"
      - --max-model-len
      - "16384"
      - --gpu-memory-utilization
      - "0.05"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11463/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  huggingface_cache:
    name: qwen3embedding_huggingface_cache

networks:
  default:
    name: qwen3-embedding-network
