# Carnice-V2-27B native BF16 — vanilla, NO speculative decoding
#
# kai-os/Carnice-V2-27b is a full-merge BF16 SFT of Qwen/Qwen3.6-27B for
# Hermes-style agent traces (assistant-token-loss-only on 6.5K windowed
# rows from Carnice + DJLougen Hermes + Lambda GLM-5.1 Hermes mixes).
# Same architecture as base Qwen3.6-27B (hybrid DeltaNet + Gated Attn,
# mtp_num_hidden_layers=1, MTP head intact).
#
# This compose is the bandwidth-floor reference: BF16 weights, no spec.
# 1.6 TB/s ÷ ~50 GB ≈ 32 tok/s ceiling.
#
# Apache 2.0. Public, no HF_TOKEN required.
#
# Usage: docker compose -f docker-compose.vllm-bf16-rtx.yml up -d
# API endpoint: http://localhost:11475/v1
# Model name served as: carnice-v2

services:
  carnice-v2-bf16:
    image: vllm/vllm-openai:cu130-nightly
    container_name: carnice-v2-bf16
    restart: unless-stopped

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ipc: host
    dns: ["8.8.8.8", "8.8.4.4"]
    shm_size: 64gb

    ulimits:
      memlock: -1
      stack: 67108864

    ports:
      - "11475:11475"

    volumes:
      - huggingface_cache:/root/.cache/huggingface

    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - VLLM_LOGGING_LEVEL=${VLLM_LOGGING_LEVEL:-INFO}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - VLLM_ATTENTION_BACKEND=FLASH_ATTN
      - VLLM_USE_FLASHINFER_SAMPLER=0

    command:
      - kai-os/Carnice-V2-27b
      - --served-model-name
      - carnice-v2
      - --host
      - "0.0.0.0"
      - --port
      - "11475"
      - --max-model-len
      - "65536"
      - --gpu-memory-utilization
      - "0.90"
      - --reasoning-parser
      - qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --enable-prefix-caching
      - --language-model-only
      - --max-num-batched-tokens
      - "8192"
      - --max-num-seqs
      - "256"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11475/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  huggingface_cache:
    name: carnice_v2_huggingface_cache

networks:
  default:
    name: carnice-v2-network
