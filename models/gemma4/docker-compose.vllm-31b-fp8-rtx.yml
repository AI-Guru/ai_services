# Gemma 4 31B via vLLM — FP8-block (Blackwell), no speculative decoding
#
# Target: RedHatAI/gemma-4-31B-it-FP8-block (~31 GB FP8-block weights).
# Vanilla baseline for the FP8 + MTP comparison.
#
# Same image as the MTP variant (vllm/vllm-openai:gemma4-0505-cu130) so
# the FP8 vs FP8+MTP comparison isolates the speculation effect; on this
# image the FP8 target loads cleanly (NVFP4 target hits a weight-shape
# bug at drafter load — see vllm-31b-nvfp4-mtp-rtx.yml header).
#
# Usage: docker compose -f docker-compose.vllm-31b-fp8-rtx.yml up -d
# API endpoint: http://localhost:11453/v1
# Model name served as: gemma4-31b

name: gemma4-31b-fp8-vllm

services:
  vllm-server:
    image: vllm/vllm-openai:gemma4-0505-cu130
    container_name: gemma4-vllm-31b-fp8
    restart: unless-stopped
    ipc: host
    dns:
      - 8.8.8.8
      - 8.8.4.4
    shm_size: 64gb

    ulimits:
      memlock: -1
      stack: 67108864

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ports:
      - "11453:11453"

    volumes:
      - huggingface_cache:/root/.cache/huggingface

    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - VLLM_LOGGING_LEVEL=${VLLM_LOGGING_LEVEL:-INFO}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True

    command:
      - RedHatAI/gemma-4-31B-it-FP8-block
      - --served-model-name
      - gemma4-31b
      - --host
      - "0.0.0.0"
      - --port
      - "11453"
      - --max-model-len
      - "131072"
      - --gpu-memory-utilization
      - "0.90"
      - --enable-prefix-caching
      - --max-num-batched-tokens
      - "16384"
      - --trust-remote-code

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11453/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  huggingface_cache:
    name: gemma4_huggingface_cache
    external: true
