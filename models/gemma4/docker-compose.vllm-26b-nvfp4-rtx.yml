# Gemma 4 26B-A4B via vLLM — NVFP4 quantized (Blackwell)
#
# Target: nvidia/Gemma-4-26B-A4B-NVFP4 (~12 GB NVFP4 weights). MoE with
# 128 experts (top-8 + 1 shared, 3.8B active per token). 256K native
# context; we run at 131K to match the 31B and llama-26b composes.
#
# This is the vLLM 26B-A4B variant the previous README marked impossible
# due to BF16 weights (~52 GB) exceeding the 30 GB host RAM. NVFP4 at
# 12 GB fits comfortably.
#
# Requires Blackwell GPU (SM 120+) for NVFP4 + the gemma4-cu130 image.
#
# Usage: docker compose -f docker-compose.vllm-26b-nvfp4-rtx.yml up -d
# API endpoint: http://localhost:11454/v1
# Model name served as: gemma4-26b

name: gemma4-26b-nvfp4-vllm

services:
  vllm-server:
    image: vllm/vllm-openai:gemma4-0505-cu130
    container_name: gemma4-vllm-26b
    restart: unless-stopped
    ipc: host
    dns:
      - 8.8.8.8
      - 8.8.4.4
    shm_size: 64gb

    ulimits:
      memlock: -1
      stack: 67108864

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ports:
      - "11454:11454"

    volumes:
      - huggingface_cache:/root/.cache/huggingface

    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - VLLM_LOGGING_LEVEL=${VLLM_LOGGING_LEVEL:-INFO}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True

    command:
      - nvidia/Gemma-4-26B-A4B-NVFP4
      - --served-model-name
      - gemma4-26b
      - --host
      - "0.0.0.0"
      - --port
      - "11454"
      - --max-model-len
      - "131072"
      - --gpu-memory-utilization
      - "0.90"
      - --enable-prefix-caching
      - --max-num-batched-tokens
      - "16384"
      - --trust-remote-code

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11454/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  huggingface_cache:
    name: gemma4_huggingface_cache
    external: true
