# Gemma 4 26B-A4B via llama.cpp — MoE sweet spot (128 experts, top-8+1, 3.8B active)
#
# Uses unsloth/gemma-4-26B-A4B-it-GGUF: UD-Q4_K_XL (Unsloth Dynamic).
# 25.2B total / 3.8B active per token. Achieves ~97% of 31B quality at MoE speed.
# Multimodal (text + image + video) but served text-only here.
#
# The GGUF model is downloaded automatically on first start (~17 GB).
# Downloads are cached in the shared gemma4_huggingface_cache volume.
#
# Usage: docker compose -f docker-compose.llama-26b-rtx.yml up -d
# API endpoint: http://localhost:11452/v1

name: gemma4-26b-llama

services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: gemma4-llama-26b
    restart: unless-stopped
    ipc: host
    dns:
      - 8.8.8.8
      - 8.8.4.4

    ulimits:
      memlock: -1
      stack: 67108864

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ports:
      - "11452:11452"

    volumes:
      - model_cache:/root/.cache/huggingface

    environment:
      - LLAMA_CACHE=/root/.cache/huggingface/llama.cpp
      - GGML_CUDA_GRAPH_OPT=1
      - HF_TOKEN=${HF_TOKEN:-}

    command:
      - --hf-repo
      - unsloth/gemma-4-26B-A4B-it-GGUF
      - --hf-file
      - gemma-4-26B-A4B-it-UD-Q4_K_XL.gguf
      - -ngl
      - "99"
      - -c
      - "131072"
      - -np
      - "1"
      - -fa
      - "on"
      - --cache-type-k
      - q8_0
      - --cache-type-v
      - q8_0
      - -b
      - "4096"
      - -ub
      - "2048"
      - -t
      - "8"
      - --threads-batch
      - "8"
      - --mlock
      - --special
      - --no-mmproj
      - --host
      - "0.0.0.0"
      - --port
      - "11452"
      - -a
      - gemma4-26b

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11452/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  model_cache:
    name: gemma4_huggingface_cache
    external: true
