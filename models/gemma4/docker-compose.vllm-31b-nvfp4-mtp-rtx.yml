# Gemma 4 31B via vLLM — NVFP4 + assistant-model speculative decoding
#
# Target: nvidia/Gemma-4-31B-IT-NVFP4 (~30 GB NVFP4 weights, dense 30.7B).
# Drafter: google/gemma-4-31B-it-assistant (~0.9 GB BF16) — Google's
# small "assistant" model trained as a Gemma 4 speculative drafter.
#
# Speculative-config format follows the vLLM Gemma 4 recipe:
#   https://docs.vllm.ai/projects/recipes/en/latest/Google/Gemma4.html
#
# Recipe recommends num_speculative_tokens=4 (range 4-8 for 31B).
# Requires Blackwell GPU (SM 120+) for NVFP4 + the gemma4-cu130 image.
#
# Usage: docker compose -f docker-compose.vllm-31b-nvfp4-mtp-rtx.yml up -d
# API endpoint: http://localhost:11453/v1
# Model name served as: gemma4-31b

name: gemma4-31b-nvfp4-mtp-vllm

services:
  vllm-server:
    image: vllm/vllm-openai:gemma4-0505-cu130
    container_name: gemma4-vllm-31b-mtp
    restart: unless-stopped
    ipc: host
    dns:
      - 8.8.8.8
      - 8.8.4.4
    shm_size: 64gb

    ulimits:
      memlock: -1
      stack: 67108864

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ports:
      - "11453:11453"

    volumes:
      - huggingface_cache:/root/.cache/huggingface

    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - VLLM_LOGGING_LEVEL=${VLLM_LOGGING_LEVEL:-INFO}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True

    command:
      - nvidia/Gemma-4-31B-IT-NVFP4
      - --served-model-name
      - gemma4-31b
      - --host
      - "0.0.0.0"
      - --port
      - "11453"
      - --max-model-len
      - "131072"
      - --gpu-memory-utilization
      - "0.90"
      - --enable-prefix-caching
      - --max-num-batched-tokens
      - "16384"
      - --trust-remote-code
      - --language-model-only
      - --speculative-config
      - '{"model":"google/gemma-4-31B-it-assistant","num_speculative_tokens":4}'

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11453/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  huggingface_cache:
    name: gemma4_huggingface_cache
    external: true
