# Nemotron-3-Nano-4B via TensorRT-LLM — edge/IoT model
#
# Uses nvidia/NVIDIA-Nemotron-3-Nano-4B: dense hybrid Mamba-2 + Attention.
# 42 layers, only 4 attention layers. Distilled from Nemotron-Nano-9B-v2.
#
# Backend: TensorRT-LLM PyTorch (no engine pre-compilation needed).
#
# RTX PRO 6000 Blackwell (96 GB, SM 120):
# Weights: ~8 GB BF16.
#
# Usage: docker compose -f docker-compose.trtllm-nano-4b-rtx.yml up -d
# API endpoint: http://localhost:11440/v1
# Model name served as: nemotron-nano-4b

name: nemotron-nano-4b-trtllm

services:
  nemotron-nano-4b-trtllm:
    image: nvcr.io/nvidia/tensorrt-llm/release:1.3.0rc8
    container_name: nemotron-nano-4b-trtllm
    restart: unless-stopped
    entrypoint: ["trtllm-serve"]

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ipc: host
    dns:
      - 8.8.8.8
      - 8.8.4.4
    shm_size: 64gb

    ulimits:
      memlock: -1
      stack: 67108864

    ports:
      - "11440:11440"

    volumes:
      - huggingface_cache:/root/.cache/huggingface

    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}

    command:
      - nvidia/NVIDIA-Nemotron-3-Nano-4B
      - --backend
      - pytorch
      - --trust_remote_code
      - --reasoning_parser
      - nano-v3
      - --tool_parser
      - qwen3_coder
      - --host
      - "0.0.0.0"
      - --port
      - "11440"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11440/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  huggingface_cache:
    name: qwen35_huggingface_cache
    external: true
