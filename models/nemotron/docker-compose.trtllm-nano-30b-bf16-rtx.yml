# Nemotron-3-Nano-30B-A3B BF16 via TensorRT-LLM — general-purpose MoE model
#
# Uses nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16: official NVIDIA BF16 weights.
# 30B total / ~3.5B active per token, 128 routed experts, 6 active + 1 shared.
# Hybrid Mamba-2 + MoE + Attention (NemotronH architecture).
#
# Backend: TensorRT-LLM AutoDeploy (matches NVIDIA's official HuggingFace card).
# NVIDIA lists RTX PRO 6000 96GB as tested hardware for this model.
#
# NOTE: NVFP4 quantization is NOT available on SM120 (RTX Pro 6000).
# BF16 requires ~60 GB, leaving ~36 GB for KV cache at full utilization.
#
# RTX PRO 6000 Blackwell (96 GB, SM 120):
# Weights: ~60 GB BF16.
#
# Usage: docker compose -f docker-compose.trtllm-nano-30b-bf16-rtx.yml up -d
# API endpoint: http://localhost:11440/v1
# Model name served as: nemotron-nano-30b

name: nemotron-nano-30b-bf16-trtllm

services:
  nemotron-nano-30b-bf16-trtllm:
    image: nvcr.io/nvidia/tensorrt-llm/release:1.3.0rc8
    container_name: nemotron-nano-30b-bf16-trtllm
    restart: unless-stopped
    entrypoint: ["trtllm-serve"]

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ipc: host
    dns:
      - 8.8.8.8
      - 8.8.4.4
    shm_size: 64gb

    ulimits:
      memlock: -1
      stack: 67108864

    ports:
      - "11440:11440"

    volumes:
      - huggingface_cache:/root/.cache/huggingface

    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}

    command:
      - nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16
      - --backend
      - _autodeploy
      - --trust_remote_code
      - --reasoning_parser
      - nano-v3
      - --tool_parser
      - qwen3_coder
      - --host
      - "0.0.0.0"
      - --port
      - "11440"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11440/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  huggingface_cache:
    name: qwen35_huggingface_cache
    external: true
