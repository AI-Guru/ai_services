# Nemotron-Cascade-2-30B-A3B AWQ-INT4 — coding + math champion
#
# Uses stelterlab/Nemotron-Cascade-2-30B-A3B-AWQ: AWQ 4-bit quantization.
# 30B total / ~3B active per token, 128 routed experts, 6 active + 1 shared.
# Hybrid Mamba-2 + MoE + Attention (NemotronH architecture).
#
# RTX PRO 6000 Blackwell (96 GB, SM 120):
# Weights: ~17 GB AWQ-INT4 → ~69 GB free for KV cache at 0.90 util.
# CUDA graphs work (no --enforce-eager needed).
#
# Benchmarks: LCB v6 87.2, AIME25 92.4, IOI Gold (439), ArenaHard 83.5
#
# Usage: docker compose -f docker-compose.vllm-cascade2-30b-awq-int4-rtx.yml up -d
# API endpoint: http://localhost:11441/v1
# Model name served as: nemotron-cascade2-30b

name: nemotron-cascade2-30b-awq

services:
  nemotron-cascade2-30b-awq:
    image: vllm/vllm-openai:v0.17.0-cu130
    container_name: nemotron-cascade2-30b-awq
    restart: unless-stopped

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ipc: host
    dns:
      - 8.8.8.8
      - 8.8.4.4
    shm_size: 64gb

    ulimits:
      memlock: -1
      stack: 67108864

    ports:
      - "11441:11441"

    volumes:
      - huggingface_cache:/root/.cache/huggingface

    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - VLLM_LOGGING_LEVEL=${VLLM_LOGGING_LEVEL:-INFO}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - VLLM_USE_FLASHINFER_SAMPLER=0

    command:
      - stelterlab/Nemotron-Cascade-2-30B-A3B-AWQ
      - --served-model-name
      - nemotron-cascade2-30b
      - --host
      - "0.0.0.0"
      - --port
      - "11441"
      - --max-model-len
      - "262144"
      - --gpu-memory-utilization
      - "0.90"
      - --trust-remote-code
      - --attention-backend
      - FLASHINFER
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --reasoning-parser
      - qwen3
      - --enable-prefix-caching
      - --max-num-batched-tokens
      - "16384"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11441/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  huggingface_cache:
    name: qwen35_huggingface_cache
    external: true
