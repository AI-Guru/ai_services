# Nemotron-3-Nano-4B — edge/IoT model
#
# Uses nvidia/NVIDIA-Nemotron-3-Nano-4B: dense hybrid Mamba-2 + Attention.
# 42 layers, only 4 attention layers. Distilled from Nemotron-Nano-9B-v2.
#
# RTX PRO 6000 Blackwell (96 GB, SM 120):
# Weights: ~8 GB BF16 → ~78 GB free for KV cache at 0.90 util.
#
# Usage: docker compose -f docker-compose.vllm-nano-4b-rtx.yml up -d
# API endpoint: http://localhost:11440/v1
# Model name served as: nemotron-nano-4b

name: nemotron-nano-4b

services:
  nemotron-nano-4b:
    image: vllm/vllm-openai:v0.17.0-cu130
    container_name: nemotron-nano-4b
    restart: unless-stopped

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ipc: host
    dns:
      - 8.8.8.8
      - 8.8.4.4
    shm_size: 64gb

    ulimits:
      memlock: -1
      stack: 67108864

    ports:
      - "11440:11440"

    volumes:
      - huggingface_cache:/root/.cache/huggingface

    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - VLLM_LOGGING_LEVEL=${VLLM_LOGGING_LEVEL:-INFO}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - VLLM_USE_FLASHINFER_SAMPLER=0

    command:
      - nvidia/NVIDIA-Nemotron-3-Nano-4B
      - --served-model-name
      - nemotron-nano-4b
      - --host
      - "0.0.0.0"
      - --port
      - "11440"
      - --max-model-len
      - "131072"
      - --gpu-memory-utilization
      - "0.90"
      - --trust-remote-code
      - --enable-prefix-caching
      - --max-num-batched-tokens
      - "16384"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11440/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  huggingface_cache:
    name: qwen35_huggingface_cache
    external: true
