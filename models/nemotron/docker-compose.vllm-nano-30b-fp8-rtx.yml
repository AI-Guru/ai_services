# Nemotron-3-Nano-30B-A3B FP8 — general-purpose MoE model
#
# Uses nvidia/Nemotron-3-Nano-30B-A3B-FP8: official NVIDIA FP8 quantization.
# 30B total / ~3.5B active per token, 128 routed experts, 6 active + 1 shared.
# Hybrid Mamba-2 + MoE + Attention (NemotronH architecture).
#
# RTX PRO 6000 Blackwell (96 GB, SM 120):
# Weights: ~33 GB FP8 → ~53 GB free for KV cache at 0.90 util.
#
# Usage: docker compose -f docker-compose.vllm-nano-30b-fp8-rtx.yml up -d
# API endpoint: http://localhost:11440/v1
# Model name served as: nemotron-nano-30b

name: nemotron-nano-30b-fp8

services:
  nemotron-nano-30b-fp8:
    image: vllm/vllm-openai:v0.17.0-cu130
    container_name: nemotron-nano-30b-fp8
    restart: unless-stopped

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ipc: host
    dns:
      - 8.8.8.8
      - 8.8.4.4
    shm_size: 64gb

    ulimits:
      memlock: -1
      stack: 67108864

    ports:
      - "11440:11440"

    volumes:
      - huggingface_cache:/root/.cache/huggingface

    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - VLLM_LOGGING_LEVEL=${VLLM_LOGGING_LEVEL:-INFO}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - VLLM_USE_FLASHINFER_SAMPLER=0

    command:
      - nvidia/Nemotron-3-Nano-30B-A3B-FP8
      - --served-model-name
      - nemotron-nano-30b
      - --host
      - "0.0.0.0"
      - --port
      - "11440"
      - --max-model-len
      - "262144"
      - --gpu-memory-utilization
      - "0.90"
      - --trust-remote-code
      - --attention-backend
      - FLASHINFER
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --enable-prefix-caching
      - --max-num-batched-tokens
      - "16384"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11440/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  huggingface_cache:
    name: qwen35_huggingface_cache
    external: true
