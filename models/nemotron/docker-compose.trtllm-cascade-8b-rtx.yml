# Nemotron-Cascade-8B via TensorRT-LLM — best-in-class 8B reasoning
#
# Uses nvidia/Nemotron-Cascade-8B: Qwen3-8B fine-tuned for reasoning.
# Dense Transformer (8B, all active). LCB v6: 71.1, AIME25: 80.1.
#
# Backend: TensorRT-LLM with compiled TensorRT engine (builds on first start).
#
# RTX PRO 6000 Blackwell (96 GB, SM 120):
# Weights: ~16 GB BF16.
#
# Usage: docker compose -f docker-compose.trtllm-cascade-8b-rtx.yml up -d
# API endpoint: http://localhost:11444/v1
# Model name served as: nemotron-cascade-8b

name: nemotron-cascade-8b-trtllm

services:
  nemotron-cascade-8b-trtllm:
    image: nvcr.io/nvidia/tensorrt-llm/release:1.3.0rc8
    container_name: nemotron-cascade-8b-trtllm
    restart: unless-stopped

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ipc: host
    dns:
      - 8.8.8.8
      - 8.8.4.4
    shm_size: 64gb

    ulimits:
      memlock: -1
      stack: 67108864

    ports:
      - "11444:11444"

    volumes:
      - huggingface_cache:/root/.cache/huggingface

    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}

    command:
      - trtllm-serve
      - nvidia/Nemotron-Cascade-8B
      - --backend
      - tensorrt
      - --host
      - "0.0.0.0"
      - --port
      - "11444"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11444/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  huggingface_cache:
    name: qwen35_huggingface_cache
    external: true
