# Nemotron-3-Nano-30B-A3B via llama.cpp — general-purpose MoE
#
# Uses unsloth/Nemotron-3-Nano-30B-A3B-GGUF: UD-Q4_K_XL (Unsloth Dynamic).
# 30B total / ~3.5B active per token, hybrid Mamba-2 + MoE + Attention.
#
# The GGUF model is downloaded automatically on first start (~23 GB).
# Downloads are cached in the shared qwen35_huggingface_cache volume.
#
# Usage: docker compose -f docker-compose.llama-nano-30b-rtx.yml up -d
# API endpoint: http://localhost:11442/v1

name: nemotron-nano-30b-llama

services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: nemotron-nano-30b-llama
    restart: unless-stopped
    ipc: host
    dns:
      - 8.8.8.8
      - 8.8.4.4

    ulimits:
      memlock: -1
      stack: 67108864

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ports:
      - "11442:11442"

    volumes:
      - model_cache:/root/.cache/huggingface

    environment:
      - LLAMA_CACHE=/root/.cache/huggingface/llama.cpp
      - GGML_CUDA_GRAPH_OPT=1

    command:
      - --hf-repo
      - unsloth/Nemotron-3-Nano-30B-A3B-GGUF
      - --hf-file
      - Nemotron-3-Nano-30B-A3B-UD-Q4_K_XL.gguf
      - -ngl
      - "99"
      - -np
      - "1"
      - -b
      - "4096"
      - -ub
      - "2048"
      - -t
      - "8"
      - --threads-batch
      - "8"
      - --mlock
      - --special
      - --host
      - "0.0.0.0"
      - --port
      - "11442"
      - -a
      - nemotron-nano-30b

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11442/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  model_cache:
    name: qwen35_huggingface_cache
    external: true
