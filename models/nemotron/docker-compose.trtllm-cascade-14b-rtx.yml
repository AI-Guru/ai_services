# Nemotron-Cascade-14B-Thinking via TensorRT-LLM — dense reasoning (thinking-only)
#
# Uses nvidia/Nemotron-Cascade-14B-Thinking: Qwen3-14B post-trained with
# Cascade RL. Dense Transformer (14B, all active). Thinking-only mode.
#
# Backend: TensorRT-LLM with compiled TensorRT engine (builds on first start).
#
# RTX PRO 6000 Blackwell (96 GB, SM 120):
# Weights: ~28 GB BF16.
#
# Usage: docker compose -f docker-compose.trtllm-cascade-14b-rtx.yml up -d
# API endpoint: http://localhost:11445/v1
# Model name served as: nemotron-cascade-14b

name: nemotron-cascade-14b-trtllm

services:
  nemotron-cascade-14b-trtllm:
    image: nvcr.io/nvidia/tensorrt-llm/release:1.3.0rc8
    container_name: nemotron-cascade-14b-trtllm
    restart: unless-stopped

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ipc: host
    dns:
      - 8.8.8.8
      - 8.8.4.4
    shm_size: 64gb

    ulimits:
      memlock: -1
      stack: 67108864

    ports:
      - "11445:11445"

    volumes:
      - huggingface_cache:/root/.cache/huggingface

    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}

    command:
      - trtllm-serve
      - nvidia/Nemotron-Cascade-14B-Thinking
      - --backend
      - tensorrt
      - --host
      - "0.0.0.0"
      - --port
      - "11445"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11445/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  huggingface_cache:
    name: qwen35_huggingface_cache
    external: true
