# Nemotron-Terminal-8B — CLI/terminal agent (fastest)
#
# Uses nvidia/Nemotron-Terminal-8B: Qwen3-8B fine-tuned for terminal tasks.
# Dense Transformer (8B, all active). Standard vLLM compatibility.
#
# RTX PRO 6000 Blackwell (96 GB, SM 120):
# Weights: ~16 GB BF16 → ~70 GB free for KV cache at 0.90 util.
#
# Usage: docker compose -f docker-compose.vllm-terminal-8b-rtx.yml up -d
# API endpoint: http://localhost:11440/v1
# Model name served as: nemotron-terminal-8b

name: nemotron-terminal-8b

services:
  nemotron-terminal-8b:
    image: vllm/vllm-openai:v0.17.0-cu130
    container_name: nemotron-terminal-8b
    restart: unless-stopped

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ipc: host
    dns:
      - 8.8.8.8
      - 8.8.4.4
    shm_size: 64gb

    ulimits:
      memlock: -1
      stack: 67108864

    ports:
      - "11440:11440"

    volumes:
      - huggingface_cache:/root/.cache/huggingface

    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - VLLM_LOGGING_LEVEL=${VLLM_LOGGING_LEVEL:-INFO}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True

    command:
      - nvidia/Nemotron-Terminal-8B
      - --served-model-name
      - nemotron-terminal-8b
      - --host
      - "0.0.0.0"
      - --port
      - "11440"
      - --max-model-len
      - "131072"
      - --gpu-memory-utilization
      - "0.90"
      - --enable-prefix-caching
      - --max-num-batched-tokens
      - "16384"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11440/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  huggingface_cache:
    name: qwen35_huggingface_cache
    external: true
