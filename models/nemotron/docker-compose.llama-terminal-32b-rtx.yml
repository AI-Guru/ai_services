# Nemotron-Terminal-32B via llama.cpp — CLI/terminal agent (strongest)
#
# Uses mradermacher/Nemotron-Terminal-32B-i1-GGUF: imatrix Q4_K_M.
# Dense Qwen3-32B fine-tune for terminal tasks (32B, all active).
#
# The GGUF model is downloaded automatically on first start (~20 GB).
#
# Usage: docker compose -f docker-compose.llama-terminal-32b-rtx.yml up -d
# API endpoint: http://localhost:11448/v1

name: nemotron-terminal-32b-llama

services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: nemotron-terminal-32b-llama
    restart: unless-stopped
    ipc: host
    dns:
      - 8.8.8.8
      - 8.8.4.4

    ulimits:
      memlock: -1
      stack: 67108864

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ports:
      - "11448:11448"

    volumes:
      - model_cache:/root/.cache/huggingface

    environment:
      - LLAMA_CACHE=/root/.cache/huggingface/llama.cpp
      - GGML_CUDA_GRAPH_OPT=1

    command:
      - --hf-repo
      - mradermacher/Nemotron-Terminal-32B-i1-GGUF
      - --hf-file
      - Nemotron-Terminal-32B.i1-Q4_K_M.gguf
      - -ngl
      - "99"
      - -c
      - "40960"
      - -np
      - "1"
      - -fa
      - "on"
      - --cache-type-k
      - q8_0
      - --cache-type-v
      - q8_0
      - -b
      - "4096"
      - -ub
      - "2048"
      - -t
      - "8"
      - --threads-batch
      - "8"
      - --mlock
      - --host
      - "0.0.0.0"
      - --port
      - "11448"
      - -a
      - nemotron-terminal-32b

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11448/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  model_cache:
    name: qwen35_huggingface_cache
    external: true
