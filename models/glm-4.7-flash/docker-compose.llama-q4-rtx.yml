# GLM-4.7-Flash (30B MoE, ~3.6B active) via llama.cpp — Q4_K_XL quantization
#
# Uses the official llama.cpp server CUDA image with automatic model download.
# The GGUF model is downloaded on first start (~18 GB).
# Downloads are cached in the shared glm47_huggingface_cache volume.
#
# Usage: docker compose -f docker-compose.llama-q4-rtx.yml up -d
# API endpoint: http://localhost:11439/v1

services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: glm47-llama-q4
    restart: unless-stopped

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ports:
      - "11439:11439"

    volumes:
      - model_cache:/root/.cache/huggingface

    environment:
      - LLAMA_CACHE=/root/.cache/huggingface/llama.cpp

    command:
      - --hf-repo
      - unsloth/GLM-4.7-Flash-GGUF
      - --hf-file
      - GLM-4.7-Flash-UD-Q4_K_XL.gguf
      - -ngl
      - "99"
      - -c
      - "202752"
      - -np
      - "1"
      - -fa
      - "on"
      - --cache-type-k
      - q8_0
      - --cache-type-v
      - q8_0
      - --host
      - "0.0.0.0"
      - --port
      - "11439"
      - --temp
      - "0.7"
      - --top-p
      - "1.0"
      - --repeat-penalty
      - "1.0"
      - --jinja
      - -a
      - glm-4.7-flash

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11439/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  model_cache:
    name: glm47_huggingface_cache
    external: true
